name: Show
extends: Handle
category: Visualizing
draft: true
defined: true 
summary: Simply shows and hides one or more elements according to events. Can show one of a set of elements at random, the _next_ one of a set of elements (looping back where applicable), or _some_ of a set of elements. Compensates for latency associated with bluetooth headphones and USB audio devices.
props:
  - name: selector
    type: string 
    default: ':scope > *'
    description: Selector for descendant elements to be shown and unshown. Can be any elements and can change subject to (for example) **Blam** `value` randomization. Can be SVG elements belonging to an inline SVG.
  - name: prop
    description: Not applicable.
  - name: some 
    type: boolean or number
    default: false
    description: Set as a boolean attribute, some elements are shown each time. By default it’s between one and all. If a numeric value is given, that’s how many (random) elements are shown.
  - name: cycle
    type: boolean
    default: false
    description: Whether to show each element in turn
