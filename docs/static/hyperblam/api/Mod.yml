name: Mod
category: Automating
defined: true
draft: true
summary: Extracts discrete values from LFOs to be used as multipliers. Great for automating regular prop values over time.
extends: Handle
props: 
  - name: wave
    type: string
    default: triangle
    description: The waveform for the built-in LFO. Can be ‘sine’, ‘square’, ‘sawtooth’, or ‘triangle’.
  - name: gain
    type: number
    default: 1
    description: Represents how much the multiplier value changes in either direction.
  - name: beats
    type: number
    default: 16
    description: The frequency of the built-in LFO in beats, mapped to the `bpm` of an ancestor **Audio** or **Sequencer** element.
  - name: invert
    type: boolean
    default: false
    description: Reverses the LFO polarity. `1` values become `-1` and vice versa.