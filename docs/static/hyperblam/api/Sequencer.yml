name: Sequencer 
category: Sequencing
defined: true 
summary:  Schedules future beats in a sequence and alerts subscribing elements.
props: 
  - name: scale 
    type: number 
    default: 1
    description: The size of the interval in quarter-beats. `2` would mean each interval is, in effect, a half-beat.
  - name: swing 
    type: boolean|number 
    default: 'null' 
    description: Applied as a Boolean attribute, it applies a swing of `0.333`, making adjacent beats the first and last beats of a triplet. Supply a number to adjust this value.
events: 
  - name: blam 
    description: Critically contains the time for the scheduled beat (relative to `currentTime`), but also supplies **Sequencer** and **Track** information.
methods: 
  - name: play 
    description: Starts the sequencer, which begins emitting `blam` events at intervals according to the current `scale`.
  - name: stop 
    description: Ceases emitting `blam` events and resets all descendant **Track** elements, essentially rewinding each to the beginning of their first **Bar**’s `s` pattern.
  - name: pause 
    description: Ceases emitting `blam` events. Does not reset any constituent **Tracks**.
  - name: playStop
    description: Toggles between `play` and `stop`.
  - name: playPause
    description: Toggles between `play` and `pause`.