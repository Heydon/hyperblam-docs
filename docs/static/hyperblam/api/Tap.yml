name: Tap 
extends: Set
category: Controlling
defined: true
summary: Takes a child button element and uses it to trigger any method, or to apply any prop or param value. If `aria-pressed` is supplied on page load, the button becomes a toggle and the value will switch between `true` and `false`.
props: 
  - name: event 
    default: click
events:
  - name: blam 
    description: Fired whenever the `<button>` is clicked. Where `to` is not set, `Tap` just fires this event. Then users can trigger handlers like `<relay-blam>` directly.
