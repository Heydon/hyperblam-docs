name: Lfo
extends: Osc
defined: true 
category: Modulating
summary: A multi-purpose Low Frequency Oscillator (LFO). Modulate any `audioParam` of any element, including any other LFO. 
props: 
  - name: prop
    type: string 
    default: 'gain'
    description: The `audioParam` to which the **LFO** connects. This may be mapped to a `prop` or exposed separately. Its value at the time of connection represents the _center_ value for oscillation.