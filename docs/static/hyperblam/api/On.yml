name: On 
extends: Handle
category: Controlling
defined: true 
summary: Handles `midiOn` events, typically for playing an instrument’s sounds.
props: 
  - name: device 
    type: string 
    default: 'null' 
    description: The named MIDI device to listen to. If not set, the element listens to all connected devices.
  - name: root 
    type: string 
    default: C4 
    description: The key on the MIDI keyboard from which all sounds will be mapped.
  - name: range 
    type: number 
    default: 'null'
    description: How many keys, from the `root`, will be mapped (will actively make sounds). If not set, it’s the whole keyboard.
  - name: spread 
    type: boolean 
    default: false 
    description: For non-tonal instruments like Pads. Whether to spread the individual sounds over the range of keys (one sound per key).
  - name: from
    description: CSS selector. Must be a **Midi** element. If not set, looks for an ancestor **Midi** element.
  - name: to
    description: CSS selector. If not set, it looks for a single **Sampler**-based element.
