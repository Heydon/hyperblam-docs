name: Track 
extends: Handle 
category: Sequencing
defined: true 
summary: Corresponds to a **Sequencer** and uses child **Bar** elements to define repeating rhythmic patterns.
props: 
  - name: solo 
    type: boolean 
    default: false 
    description: When applied, all other **Track** elements belonging to the ancestor **Sequencer** are suspended (their sounds aren’t played).
  - name: overrides
    type: string 
    default: 'null'
    description: A space-separated list of **Track** `id`s. **Tracks** (belonging to a common **Sequencer**) whose sounds will _not_ play when this **Track** plays a sound. Important for polymetric sequencing, to avoid “collisions”.
  - name: from
    description: A CSS selector representing all elements from which events should be listen to. Defaults to an ancestor **Sequencer** element for **Tracks**.
  - name: to
    description: A CSS selector representing all elements that respond to stated events. Typically one or more **Sampler**-based elements.
  - name: suspend 
    type: boolean
    default: false 
    description: Stops the **Track** from playing associated source sounds. Does not stop samples dead (like a mute). Instead, the final sound is allowed to play out.
events: 
  - name: blam
    description: Fired whenever the current bar’s current step makes a sound. For a more regular series of events, use the parent **Sequencer’s** blam event instead.