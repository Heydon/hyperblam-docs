name: Saturator
extends: Box
category: Processing
defined: true
summary: A saturation/distortion effect with multiple modes, attenuation through a dedicated `gain`, and two filters for cutting any unwanted low and high frequencies.
props:
  - name: amount 
    default: 50 
    type: number 
    description: The amount of saturation applied. Beware that very low numbers result in a drop in overall volume. Adjust the `wet` and `dry` signals to mix distortion with the incoming sound.
  - name: mode
    default: 1 
    type: number 
    description: The type of waveshaping algorithm applied. At the time of writing, 4 modes are offered. Check the source file for more. They formulas appear in the `makeCurve()` function.  
  - name: lowcut 
    default: 100
    type: number 
    description: A highpass filter for removing any “booming” frequencies produced by applying the saturation.
  - name: highcut 
    default: 20000
    type: number 
    description: A lowpass filter for taking out harsher frequencies from the high end.
  - name: gain 
    default: 0.1
    type: number 
    description: For attenuation purposes. Set very low by default, since the saturation adds a lot of its own gain. In testing, `0.1` seems to be just over [unity gain](https://www.sweetwater.com/insync/what-is-unity-gain-and-why-should-i-care/).
