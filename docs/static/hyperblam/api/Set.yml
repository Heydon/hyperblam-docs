name: Set
category: Controlling
summary: Handles events to affect a prop, set an attribute, execute a method, or append a CSS custom property. Which of these three are applicable is automatically determined from the `prop` name supplied.
extends: Handle
props: 
  - name: ramp
    type: number
    default: null
    description: In beats. Where the `prop` is an `audioParam`, whether to ramp the value. For example, for `gain`, whether to fade/slide between the start and end values.
  - name: revert
    type: boolean
    default: false
    description: When `revert` is applied, values do not _stick_. Once set, the next event reverts them to the original value (the one taken from the element during initialization). Used with a low `chance`, you create the effect of a regular value that just occasionally, and momentarily, strays.
  - name: prop
    description: Can be the name of a property (which may map to an `audioParam`), an attribute, a method/function, or prepend with `--` to make it a CSS custom property. 
  - name: value 
    type: string 
    default: 'null'
    description: '**Set**-derived elements support special `value` syntax. Separate with `|` and one value is chosen at random. You can “prefer” certian values by including them more than once, like `0.1|0.1|0.2`. Separate with `~` and a value is chosen within the range `[x]~[n]`. Separate with ` ` (a single space) if you are supplying multiple args to an element’s method.'
  - name: once 
    type: boolean 
    default: false 
    description: Whether to only handle the event one time. Interesting, compositionally, when paired with a low `chance`.