name: Gain 
extends: Box 
category: Processing
defined: true 
summary: A basic gain (volume) effect. Can be automated with an LFO to create tremolo effects or an Envelope to affect attack or delay.
props: 
  - name: gain 
    type: number 
    default: 1 
    description: The gain of the gain node. This is relative to the input gain. The default value, `1`, means _no change_.
