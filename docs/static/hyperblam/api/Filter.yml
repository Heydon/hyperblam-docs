name: Filter
extends: Box
category: Processing
defined: true
summary: A single-band filter effect. Important for coloring sound.
props: 
  - name: freq 
    type: number 
    default: 1000 
    description: The frequency for the filter, in hertz. The role of this frequency depends on the `type`.
  - name: q 
    type: number 
    default: 1
    description: The quality factor (often relating to resonance).
  - name: type 
    type: string
    default: lowpass
    description: The type of filter. This can only be one of ‘lowpass’, ‘highpass’, ‘bandpass’, or ‘notch’.