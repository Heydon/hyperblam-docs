name: Log
category: Visualizing
extends: Handle
experimental: true
defined: true
summary: Logs event data. Not to be confused with **Display** which tracks prop/param changes.
props: 
  - name: cumulative
    type: boolean
    description: Whether to log additively or to just log the last event’s data. If set, each successively rendered `<span>` will have `role="listitem"` and the element itself will take `role="list"`.
  - name: prop
    type: string
    description: The property belonging to the event’s data (the `CustomEvent` `detail` property). If not set (`null`), the whole of `event.detail` is stringified.
  - name: value 
    description: Not applicable for **Log**.
  - name: to
    description: Not applicable for **Log**.