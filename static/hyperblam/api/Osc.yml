name: Osc
category: Modulating
summary: The base element for creating elements with oscillators.
props:
  - name: type 
    type: string 
    default: sine
    description: The waveform for the oscillator. Can be ‘sine’, ‘square’, ‘sawtooth’, or ‘triangle’.
  - name: gain 
    type: number 
    default: 1 
    description: For an LFO, the gain represents how much the `param` value changes in either direction. If the `param` value is `0.5` and the LFO `gain` value is `0.25`, the `param` value will oscillate between `0.25` and `0.75`, passing through `0.5` in both directions.
  - name: beats 
    type: number 
    default: 1 
    description: The frequency of the LFO in beats, mapped to the `bpm` of an ancestor **Audio** or **Sequencer** element.
  - name: detune 
    type: number 
    default: 0 
    description: The _relative_ frequency, in cents (`100` cents is 1 semitone). The default, `0`, means the frequency in `beats` is unchanged. 
  - name: invert 
    type: boolean 
    default: false 
    description: Reverses the LFO polarity. `1` values become `-1` and vice versa.