name: Kbd
extends: Set
category: Controlling
defined: true
summary: Use a single keyboard key to trigger sounds, toggle props, or do just about anything.
props: 
  - name: key
    default: Spacebar (‘ ’)
    type: string
    description: The relevant key (corresponding to [`event.key`](https://developer.mozilla.org/en-US/docs/Web/API/UI_Events/Keyboard_event_key_values))
