name: Switch
extends: Set
category: Controlling
defined: true 
summary: Takes an input of type `checkbox` and uses it to change any target prop of any element.
props: 
  - name: event 
    default: input 
    description: Do not supply an `event` prop for this element. It must use the child input’s `input` event.
  - name: value 
    description: If a `value` is supplied, when the input in checked, the `value` is applied. When unchecked, it reapplies the `prop`’s initial value. If no `value` is applied the value is considered Boolean.
  - name: reverse
    default: false
    description: Whether to reverse the polarity of the checked state. Useful where the label and prop seem to contradict one another. For example, a switch labeled “filter” that turns a filter _on_ by making its bypass property `false`.