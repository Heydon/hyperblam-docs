name: Visualiser
extends: Base
category: Visualizing
summary: Base element for translating **Analyser** data. Data is namespaced by taking the element’s id, taking the **Analyser’s** `id`, or generating a random 4 character string, in that order of priority.
props:
  - name: analyser
    type: string
    description: A CSS selector for the **Analyser** element. Defaults to the first **Analyser** found in the page.
  - name: transport
    type: string
    description: A CSS selector representing the element used to start and stop listening to analyser data. This element must fire `blamplay` and `blamstop` events. At the time of writing, **Media**, **Pads**, and **Notes** do this.
  - name: fps
    type: number 
    default: 25
    description: Frames per second. The frequency with which **Analyser** data is read.