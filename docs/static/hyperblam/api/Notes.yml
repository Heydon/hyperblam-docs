name: Notes 
extends: Sampler
category: Sampling
defined: true 
summary: A pitched instrument, using multiple, randomized samples to create tonal variety.
props: 
  - name: root 
    type: string 
    default: C4
    description: The root note for the buffers/sounds where not supplied by the individual **Sample** element. Used to calculate pitch shifts.
  - name: notes 
    type: string 
    default: ‘C4 D#4 G4’
    description: A set of notes from which to select at random.
methods: 
  - name: play 
    description: Plays one of the associated Bank’s sounds at a given pitch.
    args: '**cipher**: The note (such as ‘C4’) or `id` Where `undefined`, either a random note or the next note from `notes` is played, depending on whether `robin` is true, **time**: When, relative to the context’s `currentTime`, to play the sound. Immediately, if not set.' 