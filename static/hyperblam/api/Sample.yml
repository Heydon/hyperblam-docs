name: Sample 
defined: true 
category: Sampling
summary: Converts a sound file into a buffer that can be triggered as a sound by an instrument.
props: 
  - name: src 
    type: string 
    description: The path to the sample sound file. Typically, this would be an mp3.
  - name: root 
    type: string 
    default: C4
    description: The note the sample represents, if it is tonal. Used for calculating pitch changes.
  - name: reverse
    type: boolean 
    default: false 
    description: Whether to save a reversed version of the sample as well. Used with instruments’ reverse property, which sets the probability of samples being played in reverse.
events:
  - name: blamsource
    description: Fired when the buffer has been created. The buffer itself is passed in the event data.