name: Audio
defined: true
extends: WithParams
summary: The top-level **HYPERBLAM** element, setting the audio context for all element operations within it. 
props:
  - name: gain
    type: number
    default: 0.75
    description: The output gain, sent to the destination. Think of it as the master volume.
  - name: bpm
    type: number
    default: config.bpm
    description: The tempo, in beats per minute. Is overruled by a **Sequencer** element, where present.
events: 
  - name: blamsources
    description: Fired when all descendant sound sources are ready for playing.
