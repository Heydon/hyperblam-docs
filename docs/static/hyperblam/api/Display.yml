name: Display
category: Visualizing
extends: Base
defined: true
summary: Watches and renders the changing value of any property/attribute of any element. 
props: 
  - name: element
    type: string
    description: A CSS selector representing the element to watch. Falls back to the `parentNode` where not supplied.
  - name: prop
    type: string
    description: The attribute defining the value to be displayed. If not supplied, nothing is displayed.