name: Intersect 
defined: true 
experimental: true
category: Automating
summary: Emits events with intersection data.
props: 
  - name: root 
    type: string 
    default: (the viewport)
    description: CSS selector representing the scollable area containing the observed elements. Defaults to the viewport.
  - name: steps 
    type: number 
    default: 10 
    description: The granularity of intersection being observed. Where set to `10`, 10 events are fired, each with a ratio between `0.1` and `1`.
  - name: margin 
    type: string 
    default: 0
    description: Alias for the standard `rootMargin` supplied to the observer settings. CSS value that must be a `%` or `px` value.
events: 
  - name: blam 
    description: Emitted whenever an intersection occurs, carrying the intersection ratio as `x`, `on` (is intersection happening?), and `switch` (whether the intersection status changed).