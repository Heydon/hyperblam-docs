name: Phaser 
extends: Box 
defined: true 
category: Processing
summary: A classic phaser effect. The sound of a signal going in and out of phase with itself.
props: 
  - name: beats 
    type: number 
    default: 1 
    description:  The length of the phasing effect, relative to the `bpm`.
  - name: center 
    type: number
    default: 8000
    description: The frequency phasing centers around.
  - name: depth
    type: number
    default: 7000
    description: The distance from the `center` frequency in both directions.
  - name: q 
    type: number 
    default: 1 
    description: The quality factor. The resonance of the effect.
  - name: mix 
    default: 0.5