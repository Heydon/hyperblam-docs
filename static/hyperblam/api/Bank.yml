name: Bank
category: Sampling
defined: true
summary: Organizes samples into a single bank for provisioning a sample-based instrument like Pads or Notes.
extends: Handle
props: 
  - name: event
    default: blamready
    description: By default, the **Bank** fetches and converts constituent samples on the `blamready` event, which is fired on the window when all elements have been defined.
  - name: from
    description: A CSS selector representing all elements from which events should be listened to. Defaults to `window` for **Bank**.
  - name: to
    description: A CSS selector representing all elements to affect in response to the event. Defaults to the **Bank** element itself, in this case, and should not be altered.
  - name: prop
    type: string
    description: Not applicable for **Bank**.
  - name: value
    type: string
    description: Not applicable for **Bank**.
events: 
  - name: blambank
    description: Fired when all the **Bank**’s samples have been converted to buffers and are ready for use. The data contains the buffers as `sounds`.

  